<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف العلالي - النسخة السريعة</title>
    <script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
    <style>
        :root { --gold: #c4a484; --red-alali: #b71c1c; --bg: #000; }
        body { background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .navbar { width: 100%; background: #1a1a1a; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; box-sizing: border-box; z-index: 1000; border-bottom: 2px solid var(--red-alali); }
        .alali-logo-nav { background: linear-gradient(145deg, var(--red-alali), #800000); padding: 5px 15px; border-radius: 15px 5px 15px 5px; border: 1px solid var(--gold); color: white; font-weight: bold; font-size: 14px; }
        .surah-name { color: var(--gold); font-size: 16px; font-weight: bold; }
        .btn { background: #2c2c2c; color: white; border: 1px solid var(--gold); padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .viewport { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #000; }
        #book-wrapper { transform-origin: center; display: flex; justify-content: center; align-items: center; }
        
        /* تحسين مظهر الصفحة أثناء التحميل */
        .page { background: #fff !important; width: 100%; height: 100%; position: relative; }
        .page img { width: 100%; height: 100%; object-fit: fill; display: block; }
        
        /* إضافة مؤشر تحميل خفيف جداً إذا كانت الصورة لم تصل بعد */
        .page::after { content: "جاري التحميل..."; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ccc; font-size: 12px; z-index: -1; }

        select { background: #2c2c2c; color: white; border: 1px solid var(--gold); padding: 4px; border-radius: 4px; font-size: 13px; width: 100px; outline: none; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="alali-logo-nav">العلالي</div>
    <div class="surah-name" id="cur-surah">سورة الفاتحة</div>
    <div style="display:flex; gap:5px;">
        <select id="s-list" onchange="jump(this.value)"><option value="">الفهرس..</option></select>
        <button class="btn" onclick="pageFlip.flipNext()">السابقة</button>
        <button class="btn" onclick="pageFlip.flipPrev()">التالية</button>
    </div>
</div>

<div class="viewport">
    <div id="book-wrapper">
        <div id="quran-book"></div>
    </div>
</div>

<script>
    let pageFlip;
    const offset = 2; 
    const total = 606;

    const surahs = [{n:"الفاتحة", p:1}, {n:"البقرة", p:2}, {n:"آل عمران", p:50}, {n:"النساء", p:77}, {n:"المائدة", p:106}, {n:"الأنعام", p:128}, {n:"الأعراف", p:151}, {n:"الأنفال", p:177}, {n:"التوبة", p:187}, {n:"يونس", p:208}, {n:"هود", p:221}, {n:"يوسف", p:235}, {n:"الملك", p:562}, {n:"الناس", p:604}];

    window.onload = function() {
        const book = document.getElementById('quran-book');
        const sel = document.getElementById('s-list');
        surahs.forEach(s => sel.add(new Option(s.n, s.p)));

        for (let i = 1; i <= total; i++) {
            const page = document.createElement('div');
            page.className = 'page';
            // إزالة loading="lazy" لزيادة السرعة
            page.innerHTML = `<img src="${i}.jpg">`;
            book.appendChild(page);
        }

        pageFlip = new St.PageFlip(book, {
            width: 450, height: 650, size: "fixed",
            showCover: false, direction: "rtl",
            usePortrait: (window.innerWidth < 850), 
            drawShadow: true, maxShadowOpacity: 0.2, flippingTime: 600 // تسريع زمن التقليب قليلاً
        });

        pageFlip.loadFromHTML(document.querySelectorAll('.page'));

        // وظيفة التحميل المسبق للصور الذكي
        function preloadImages(currentPage) {
            const range = 5; // تحميل 5 صفحات للأمام و5 للخلف
            for (let i = currentPage - range; i <= currentPage + range; i++) {
                if (i >= 1 && i <= total) {
                    const img = new Image();
                    img.src = `${i}.jpg`;
                }
            }
        }

        function adjustScale() {
            const container = document.getElementById('book-wrapper');
            const isMob = window.innerWidth < 850;
            const scale = Math.min(window.innerWidth * 0.95 / (isMob ? 450 : 900), (window.innerHeight - 80) * 0.95 / 650);
            container.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', () => {
            pageFlip.update({usePortrait: (window.innerWidth < 850)});
            adjustScale();
        });

        adjustScale();
        
        pageFlip.on('flip', (e) => {
            const qP = (e.data + 1) - offset;
            preloadImages(e.data + 1); // تحميل الصور المحيطة فوراً عند كل قلبة
            if (qP >= 1) {
                let s = surahs.filter(x => x.p <= qP).slice(-1)[0];
                if(s) document.getElementById('cur-surah').innerText = "سورة " + s.n;
            }
        });

        setTimeout(() => { 
            pageFlip.turnToPage(offset);
            preloadImages(offset); // تحميل البداية
        }, 400);
    };

    function jump(p) { if(p) pageFlip.turnToPage(parseInt(p) + offset - 1); }
</script>
</body>
</html>
